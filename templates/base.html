<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Career Agent{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">AI</span>
                    <span class="logo-text">AgentAI</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="{% url 'profile_setup' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'profile_setup' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    Candidate Profile
                </a>
                <a href="{% url 'profile_review' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'profile_review' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4M7 4h10a2 2 0 012 2v14H5V6a2 2 0 012-2z"></path>
                    </svg>
                    Review Claims
                </a>
                <a href="{% url 'job_discovery' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'job_discovery' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 002-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                    Job Discovery
                </a>
                <a href="{% url 'job_queue' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'job_queue' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h7"></path>
                    </svg>
                    Auto Queue
                </a>
                <a href="{% url 'metrics_dashboard' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'metrics_dashboard' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                        </path>
                    </svg>
                    Metrics
                </a>
                <a href="{% url 'applications_dashboard' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'applications_dashboard' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v14H5V6a2 2 0 012-2z"></path>
                    </svg>
                    Applications
                </a>
                <a href="{% url 'profile_evidence' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'profile_evidence' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m5-3a8 8 0 11-16 0 8 8 0 0116 0z"></path>
                    </svg>
                    Profile Evidence
                </a>
                <a href="{% url 'provider_settings' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'provider_settings' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Providers
                </a>
                <a href="{% url 'channel_settings' %}"
                    class="nav-link {% if request.resolver_match.url_name == 'channel_settings' %}active{% endif %}">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 10h8M8 14h5m7-2a8 8 0 11-3.293-6.477"></path>
                    </svg>
                    Channels
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            </header>

            <div class="content-wrapper">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>

</html>
